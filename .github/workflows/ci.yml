name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    env:
      AUTH_GITHUB_ID: ci-github-id
      AUTH_GITHUB_SECRET: ci-github-secret
      AUTH_GOOGLE_ID: ci-google-id
      AUTH_GOOGLE_SECRET: ci-google-secret
      AUTH_SECRET: ci-auth-secret
      DATABASE_URL: mongodb://localhost:27017/forge-ci
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate environment contract
        run: npm run validate:env

      - name: Validate hosted AI environment contract
        run: npm run validate:env
        env:
          AI_PROVIDER: openai-compatible
          OPENAI_API_KEY: ci-openai-key
          OPENAI_MODEL: ci-openai-model

      - name: Validate strict deployment environment contract
        run: npm run validate:env:strict
        env:
          AUTH_GITHUB_ID: ci_github_client_id
          AUTH_GITHUB_SECRET: ci_github_client_secret
          AUTH_GOOGLE_ID: ci_google_client_id
          AUTH_GOOGLE_SECRET: ci_google_client_secret
          AUTH_SECRET: ci-auth-secret-for-strict-env-check-12345
          AI_PROVIDER: openai-compatible
          DATABASE_URL: mongodb+srv://user:pass@cluster.example/forge-ci
          NEXTAUTH_URL: https://forge-ci.example
          OPENAI_API_KEY: ci_openai_api_key_not_real
          OPENAI_MODEL: ci-openai-model

      - name: Validate starter templates
        run: npm run validate:templates

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Smoke production server
        run: npm run smoke:prod
